services:
  # Aplicación Laravel
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cronosmatic_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
      - ./docker/php/custom.ini:/usr/local/etc/php/conf.d/custom.ini
      - ./docker/nginx.conf:/etc/nginx/sites-available/default
      - ./docker/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf
    ports:
      - "8000:80"
    depends_on:
      db:
        condition: service_healthy
      db_test:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY}
      - APP_NAME="CronosMatic Store"
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mariadb
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=cronosmatic
      - DB_USERNAME=cronosmatic
      - DB_PASSWORD=cronosmatic_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_CACHE_DB=1
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - CACHE_DRIVER=redis
    networks:
      - cronosmatic_network

  # Base de datos MariaDB (desarrollo)
  db:
    image: mariadb:10.11
    container_name: cronosmatic_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cronosmatic
      MYSQL_USER: cronosmatic
      MYSQL_PASSWORD: cronosmatic_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cronosmatic_network

  # Base de datos MariaDB (testing — aislada de la de desarrollo)
  # Usada por PHPUnit (APP_ENV=testing) y por Cypress E2E.
  # Se borra y reseedea en cada `make test-e2e` / `make test-all` sin tocar `cronosmatic`.
  db_test:
    image: mariadb:10.11
    container_name: cronosmatic_db_test
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cronosmatic_test
      MYSQL_USER: cronosmatic
      MYSQL_PASSWORD: cronosmatic_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3307:3306"
    volumes:
      - db_test_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - cronosmatic_network

  # Redis para cache y sesiones
  redis:
    image: redis:7-alpine
    container_name: cronosmatic_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      start_period: 5s
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - cronosmatic_network

  # phpMyAdmin para gestión de base de datos
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: cronosmatic_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: cronosmatic
      PMA_PASSWORD: cronosmatic_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "8080:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cronosmatic_network

  # Servicio de desarrollo (opcional)
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: cronosmatic_dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - /var/www/html/node_modules
      - /var/www/html/vendor
    ports:
      - "3000:3000"
      - "5173:5173"
    depends_on:
      db:
        condition: service_healthy
      db_test:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY}
      - APP_NAME="CronosMatic Store"
      - APP_URL=http://localhost:3000
      - DB_CONNECTION=mariadb
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=cronosmatic
      - DB_USERNAME=cronosmatic
      - DB_PASSWORD=cronosmatic_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - REDIS_CACHE_DB=1
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - CACHE_DRIVER=redis
    networks:
      - cronosmatic_network
    command: ./docker/dev-start.sh

volumes:
  db_data:
    driver: local
  db_test_data:
    driver: local
  redis_data:
    driver: local

networks:
  cronosmatic_network:
    driver: bridge
